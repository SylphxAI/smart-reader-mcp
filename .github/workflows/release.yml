name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check code quality
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Verify Rust-default consumer bin is staged
        run: |
          set -euo pipefail
          test -x bin/smart-reader-mcp
          test -x bin/native/smart-reader-mcp-server
          file bin/native/smart-reader-mcp-server
          # Fail closed if the staged native is empty/tiny
          test "$(wc -c < bin/native/smart-reader-mcp-server)" -gt 100000
          # Consumer package must ship the launcher, not dist/index.js as bin
          node -e "const p=require('./package.json'); if(p.bin['smart-reader-mcp']!=='./bin/smart-reader-mcp'){console.error(p.bin); process.exit(1)}"

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
